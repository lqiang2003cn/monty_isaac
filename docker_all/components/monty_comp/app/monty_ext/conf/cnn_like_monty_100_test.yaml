# CNN-style Multi-Patch Monty — Experiment Configuration
#
# Documentation YAML generated from monty_ext.configs.cnn_like_monty_100_test.
# Class references are shown as fully-qualified Python paths.
# The authoritative config is the Python build_config() function.
#
# To run:
#   run-cnn-experiment
#   run-cnn-experiment --objects mug banana --rotations 72

experiment_class: monty_ext.experiments.cnn_experiment.CNNStylePretrainingExperiment

do_train: true
do_eval: false
max_train_steps: 1
max_eval_steps: 1
max_total_steps: 1
n_train_epochs: 72          # one epoch per rotation
n_eval_epochs: 0
min_lms_match: 1
model_name_or_path: ""
seed: 42
show_sensor_output: false
supervised_lm_ids: all

logging:
  output_dir: /results/cnn_monty
  run_name: cnn_like_monty_100
  python_log_level: INFO
  python_log_to_file: true
  python_log_to_stderr: true
  monty_log_level: SILENT
  monty_handlers:
    - tbp.monty.frameworks.loggers.monty_handlers.BasicCSVStatsHandler
  wandb_handlers: []

# ---------------------------------------------------------------------------
# Monty model (100 SMs + 100 LMs + 1 view_finder Probe)
# ---------------------------------------------------------------------------
monty_config:
  monty_class: tbp.monty.frameworks.models.graph_matching.MontyForGraphMatching
  monty_args:
    num_exploratory_steps: 1
    min_train_steps: 1
    min_eval_steps: 1
    max_total_steps: 1

  # 100 CameraSM patch modules + 1 Probe view_finder
  sensor_module_configs:
    # sensor_module_0 through sensor_module_99: CameraSM for patch_0..patch_99
    sensor_module_0:
      sensor_module_class: tbp.monty.frameworks.models.sensor_modules.CameraSM
      sensor_module_args:
        sensor_module_id: patch_0
        features: &features
          - on_object
          - rgba
          - hsv
          - pose_vectors
          - pose_fully_defined
          - principal_curvatures
          - principal_curvatures_log
          - gaussian_curvature
          - mean_curvature
          - gaussian_curvature_sc
          - mean_curvature_sc
        save_raw_obs: false
    # ... sensor_module_1 through sensor_module_98 follow the same pattern ...
    sensor_module_99:
      sensor_module_class: tbp.monty.frameworks.models.sensor_modules.CameraSM
      sensor_module_args:
        sensor_module_id: patch_99
        features: *features
        save_raw_obs: false
    sensor_module_100:
      sensor_module_class: tbp.monty.frameworks.models.sensor_modules.Probe
      sensor_module_args:
        sensor_module_id: view_finder
        save_raw_obs: false

  # 100 DisplacementGraphLM modules
  learning_module_configs:
    learning_module_0: &lm_template
      learning_module_class: tbp.monty.frameworks.models.displacement_matching.DisplacementGraphLM
      learning_module_args:
        k: 5
        match_attribute: displacement
    # ... learning_module_1 through learning_module_98 are identical ...
    learning_module_99:
      <<: *lm_template

  motor_system_config:
    motor_system_class: tbp.monty.frameworks.models.motor_system.MotorSystem
    motor_system_args:
      policy:
        class: tbp.monty.frameworks.models.motor_policies.NaiveScanPolicy
        fixed_amount: 5.0
        agent_id: agent_id_0
        action_sampler:
          class: tbp.monty.frameworks.actions.action_samplers.ConstantSampler
          actions: [LookUp, LookDown, TurnLeft, TurnRight]
          rotation_degrees: 5.0

  # Each patch SM feeds exactly one LM
  sm_to_lm_matrix:
    - [0]    # patch_0 → LM 0
    - [1]    # patch_1 → LM 1
    # ... through ...
    - [99]   # patch_99 → LM 99

  sm_to_agent_dict:
    view_finder: agent_id_0
    patch_0: agent_id_0
    patch_1: agent_id_0
    # ... all patches map to the same agent ...
    patch_99: agent_id_0

  lm_to_lm_matrix: null
  lm_to_lm_vote_matrix: null

# ---------------------------------------------------------------------------
# Environment
# ---------------------------------------------------------------------------
env_interface_config:
  env_init_func: tbp.monty.simulators.habitat.environment.HabitatEnvironment
  env_init_args:
    agents:
      agent_type: tbp.monty.simulators.habitat.MultiSensorAgent
      agent_args:
        agent_id: agent_id_0
        sensor_ids: [view_finder]
        resolutions: [[800, 1280]]      # (H, W) — single camera
        zooms: [1.0]
        positions: [[0.0, 0.0, 0.0]]
        rotations: [[1.0, 0.0, 0.0, 0.0]]
        semantics: [false]

  transform:
    - class: tbp.monty.frameworks.environment_utils.transforms.MissingToMaxDepth
      agent_id: agent_id_0
      max_depth: 1.0
    - class: tbp.monty.frameworks.environment_utils.transforms.DepthTo3DLocations
      agent_id: agent_id_0
      sensor_ids: [view_finder]
      resolutions: [[800, 1280]]
      zooms: [1.0]
      world_coord: true
      get_all_points: true
    - class: monty_ext.transforms.crop_patches.CropPatchesFromViewFinder
      agent_id: agent_id_0
      n_rows: 10
      n_cols: 10
      patch_h: 80
      patch_w: 128

train_env_interface_class: tbp.monty.frameworks.environments.embodied_data.EnvironmentInterfacePerObject
train_env_interface_args:
  object_names: [mug, banana]
  object_init_sampler:
    class: tbp.monty.frameworks.environments.object_init_samplers.Predefined
    rotations:
      # 72 Y-axis rotations (0, 5, 10, ... 355 degrees)
      - [0.0, 0.0, 0.0]
      - [0.0, 5.0, 0.0]
      - [0.0, 10.0, 0.0]
      # ... every 5 degrees through ...
      - [0.0, 355.0, 0.0]
