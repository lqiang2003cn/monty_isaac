# MoveIt joint-limit overrides and trajectory generation parameters.
# Position limits come from the URDF; velocity and acceleration are set here
# for trajectory time-parameterization.
#
# The real x3plus hardware runs at 20 Hz with servo_run_time ~80 ms, so keep
# velocities conservative to avoid commanding faster than the servos can track.

joint_limits:
  arm_joint1:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.75
  arm_joint2:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.75
  arm_joint3:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.75
  arm_joint4:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.75
  arm_joint5:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 0.75
  grip_joint:
    has_velocity_limits: true
    max_velocity: 1.0
    has_acceleration_limits: true
    max_acceleration: 1.5
