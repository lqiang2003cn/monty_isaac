# Run from docker_all:  docker compose up
# Build:  docker compose build
# Use --profile sim for simulation (isaac_comp + ros2_comp).
# Use --profile monty for Monty (tbp.monty + monty_ext).
# Both stacks use the same network (monty_net) and ROS_DOMAIN_ID for ROS2 discovery.
#
# Real robot modes are set via ROBOT_MODE env (real=USB serial, zmq=remote Orin).
# ZMQ on Orin: run ./scripts/real_up.sh up --build (from docker_all) so the
# remote_real_x3plus image is built on the Orin and the container started before local compose.
# Set REMOTE_ORIN_HOST (e.g. wheeltec@192.168.31.142) and REMOTE_ORIN_REPO_PATH if needed.
# Monty: USE_MONTY=true ./scripts/real_up.sh  (starts monty_comp alongside ros2_comp)
services:
  isaac_comp:
    build:
      context: .
      dockerfile: components/isaac_comp/Dockerfile
    image: monty_isaac_comp:latest
    profiles: ["sim"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      DISPLAY: ${DISPLAY}
      ISAAC_HEADLESS: ${ISAAC_HEADLESS:-0}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Only mount meshes; URDF is generated at build time inside the image
      - ./shared/x3plus_isaac/meshes:/shared/x3plus_isaac/meshes:ro
      - ./shared/x3plus_config:/shared/x3plus_config:ro
    networks:
      - monty_net

  ros2_comp:
    build:
      context: .
      dockerfile: components/ros2_comp/Dockerfile
    image: monty_ros2_comp:latest
    tty: true
    stdin_open: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      PYTHONUNBUFFERED: "1"
      DISPLAY: ${DISPLAY}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
      ZMQ_HOST: ${ZMQ_HOST:-192.168.31.142}
      ZMQ_PORT: ${ZMQ_PORT:-5555}
      DEBUG_LOGS: ${DEBUG_LOGS:-false}
      USE_BT: ${USE_BT:-false}
      USE_CAMERA: ${USE_CAMERA:-false}
      USE_RVIZ: ${USE_RVIZ:-false}
      USE_MONTY: ${USE_MONTY:-false}
    # ROBOT_MODE (isaac|real|zmq) and USE_MOVEIT (true|false) are set by the
    # caller's environment.  real_up.sh exports zmq+true; sim defaults apply.
    command: >-
      ros2 launch monty_demo opus_x3plus_bringup.launch.py
      mode:=${ROBOT_MODE:-isaac}
      use_moveit:=${USE_MOVEIT:-false}
      zmq_host:=${ZMQ_HOST:-192.168.31.142}
      zmq_port:=${ZMQ_PORT:-5555}
      debug_logs:=${DEBUG_LOGS:-false}
      use_bt:=${USE_BT:-false}
      use_camera:=${USE_CAMERA:-false}
      use_rviz:=${USE_RVIZ:-false}
      use_monty:=${USE_MONTY:-false}
    ports:
      - "1667:1667"
      - "5561:5561"
    # RealSense / depth cameras need broad USB device access inside the container.
    privileged: true
    volumes:
      - /dev:/dev
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /run/udev:/run/udev:ro
      - ./scripts:/scripts:ro
      - ./shared/x3plus_isaac/meshes:/shared/x3plus_isaac/meshes:ro
      - ./shared/x3plus_config:/shared/x3plus_config:ro
      - ./logs/${RUN_ID:-current}:/var/log/monty
    networks:
      - monty_net

  monty_comp:
    build:
      context: .
      dockerfile: components/monty_comp/Dockerfile
    image: monty_tbp_comp:latest
    profiles: ["monty"]
    tty: true
    stdin_open: true
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      PYTHONUNBUFFERED: "1"
      DISPLAY: ${DISPLAY}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      MONTY_DATA: /data
      MONTY_LOGS: /results
      MONTY_MODELS: /results/pretrained_models
      MODEL_CACHE_DIR: /models
      HF_HOME: /models/huggingface
      USE_CAMERA: ${USE_CAMERA:-false}
    command: >-
      bash -c "conda run --no-capture-output -n tbp.monty turntable-scan"
    ports:
      - "5560:5560"
    volumes:
      - /dev:/dev
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /run/udev:/run/udev:ro
      # Monty data: YCB objects, scanned meshes, world images
      - ${MONTY_DATA:-./data/monty}:/data
      # Monty results: experiment logs, pretrained models
      - ${MONTY_RESULTS:-./data/monty_results}:/results
      # Per-run logs (shared with ros2_comp)
      - ./logs/${RUN_ID:-current}:/var/log/monty
      # Model weight cache (SAM2, VGGT) — survives container rebuilds
      - monty_model_cache:/models
    networks:
      - monty_net

volumes:
  monty_model_cache:

networks:
  monty_net:
    driver: bridge
