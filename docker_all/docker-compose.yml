# Run from docker_all:  docker compose up
# Build:  docker compose build
# Use --profile sim for simulation (isaac_comp + ros2_comp).
# Both stacks use the same network (monty_net) and ROS_DOMAIN_ID for ROS2 discovery.
#
# Real robot modes are set via ROBOT_MODE env (real=USB serial, zmq=remote Orin).
# ZMQ on Orin: run ./scripts/real_up.sh up --build (from docker_all) so the
# remote_real_x3plus image is built on the Orin and the container started before local compose.
# Set REMOTE_ORIN_HOST (e.g. wheeltec@192.168.31.142) and REMOTE_ORIN_REPO_PATH if needed.
services:
  isaac_comp:
    build:
      context: .
      dockerfile: components/isaac_comp/Dockerfile
    image: monty_isaac_comp:latest
    profiles: ["sim"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      DISPLAY: ${DISPLAY}
      ISAAC_HEADLESS: ${ISAAC_HEADLESS:-0}
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      # Only mount meshes; URDF is generated at build time inside the image
      - ./shared/x3plus_isaac/meshes:/shared/x3plus_isaac/meshes:ro
      - ./shared/x3plus_config:/shared/x3plus_config:ro
    networks:
      - monty_net

  ros2_comp:
    build:
      context: .
      dockerfile: components/ros2_comp/Dockerfile
    image: monty_ros2_comp:latest
    tty: true
    stdin_open: true
    environment:
      PYTHONUNBUFFERED: "1"
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      RMW_IMPLEMENTATION: rmw_fastrtps_cpp
      ZMQ_HOST: ${ZMQ_HOST:-192.168.31.142}
      ZMQ_PORT: ${ZMQ_PORT:-5555}
      DEBUG_LOGS: ${DEBUG_LOGS:-true}
    # ROBOT_MODE (isaac|real|zmq) and USE_MOVEIT (true|false) are set by the
    # caller's environment.  real_up.sh exports zmq+true; sim defaults apply.
    command: >-
      ros2 launch monty_demo opus_x3plus_bringup.launch.py
      mode:=${ROBOT_MODE:-isaac}
      use_moveit:=${USE_MOVEIT:-false}
      zmq_host:=${ZMQ_HOST:-192.168.31.142}
      zmq_port:=${ZMQ_PORT:-5555}
      debug_logs:=${DEBUG_LOGS:-true}
    volumes:
      - ./scripts:/scripts:ro
      - ./shared/x3plus_isaac/meshes:/shared/x3plus_isaac/meshes:ro
      - ./shared/x3plus_config:/shared/x3plus_config:ro
    networks:
      - monty_net

networks:
  monty_net:
    driver: bridge
